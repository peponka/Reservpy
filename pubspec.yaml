name: reservpy
description: "Modern reservation platform for Paraguay"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Backend
  supabase_flutter: ^2.8.3

  # Navigation
  go_router: ^17.2.3

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  cupertino_icons: ^1.0.8

  # Calendar
  table_calendar: ^3.1.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  http: ^1.6.0
  file_picker: ^11.0.2
  path_provider: ^2.1.2
  image_picker: ^1.1.2
  qr_flutter: ^4.1.0
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#25D366"
  adaptive_icon_foreground: "assets/images/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
